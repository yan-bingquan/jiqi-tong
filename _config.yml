# 济企通 Hexo Site Configuration

title: 济企通
subtitle: 济南求职避坑指南
description: 济南企业点评平台，让求职者少踩坑，让好企业被看见
author: 济企通
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://jiqitong.com
root: /

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: languages
skip_render:

# Writing
new_post_name: :title.md
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: false
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
date_format_updated: YYYY-MM-DD

# Pagination
per_page: 20
pagination_dir: page

# Extensions
theme: landscape

# Deploy
deploy:
  type: git
  repo: https://github.com/yourusername/jiqi-tong-site.git
  branch: gh-pages

# JSON Content Generator
jsonContent:
  meta: false
  pages:
    title: true
    date: false
    updated: false
    comments: false
    path: true
    excerpt: false
    keywords: false
    text: false
  posts:
    title: true
    date: false
    updated: false
    comments: false
    path: true
    excerpt: false
    keywords: false
    text: false
    raw: false
  groups: []
  paginate:
    perPage: 20
